services:
  server:
    build:
      context: ..
      dockerfile: qcp-benchmark/Dockerfile.server
    networks:
      qcp-net:
        ipv4_address: 10.10.0.10
    command: ["-mode", "server", "-bind", "0.0.0.0"]

  client:
    build:
      context: ..
      dockerfile: qcp-benchmark/Dockerfile.client
    networks:
      qcp-net:
        ipv4_address: 10.10.0.20
    depends_on:
      - server
    cap_add:
      - NET_ADMIN
    environment:
      SCENARIO: lan
    command:
      [
        "-verify-net",
        "-server", "10.10.0.10:9000",
        "-scenario", "lan",
        "-duration", "5s",
        "-connections", "20",
      ]

networks:
  qcp-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
