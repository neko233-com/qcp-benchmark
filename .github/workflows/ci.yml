name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Verify QCP beats KCP
        run: go test ./... -count=1 -timeout 120s
      - name: Benchmark verify
        run: go run . -verify -duration 2s -connections 10
