name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  simulated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: go build ./...
        working-directory: qcp-benchmark
      - name: Vet
        run: go vet ./...
        working-directory: qcp-benchmark
      - name: Simulated verify (no loopback)
        run: go test ./... -count=1 -timeout 60s -run Simulated
        working-directory: qcp-benchmark
      - name: Simulated CLI gate
        run: go run . -verify -duration 2s -connections 10
        working-directory: qcp-benchmark

  docker-net:
    runs-on: ubuntu-latest
    needs: simulated
    steps:
      - uses: actions/checkout@v4
      - name: Docker verify-net all scenarios
        run: bash scripts/verify-docker.sh 10 3s
        working-directory: qcp-benchmark
